<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Elite Admin | Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .gold-glow { box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-card" class="w-full max-w-md bg-[#0a0a0a] p-8 rounded-3xl border border-white/5 gold-glow">
        <h1 class="text-3xl font-black text-center mb-8 uppercase tracking-tighter">Elite <span class="text-[#D4AF37]">Admin</span></h1>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl bg-black border border-white/10 outline-none focus:border-[#D4AF37] transition-all">
            <input type="password" id="password" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-black border border-white/10 outline-none focus:border-[#D4AF37] transition-all">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-[#D4AF37] text-black font-black py-4 rounded-xl uppercase tracking-widest hover:brightness-110 transition-all">
                Se connecter
            </button>
        </div>
    </div>

    <div id="admin-content" class="hidden w-full max-w-6xl animate-fade-in">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-black uppercase">Tableau de <span class="text-[#D4AF37]">Bord</span></h1>
            <button onclick="handleLogout()" class="px-4 py-2 text-xs border border-red-500/30 text-red-500 rounded-lg hover:bg-red-500/10">Déconnexion</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
             </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://aowscxkvlrlenzjhisec.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qi3zHDI2bFk-EdYmmS_jkg_KJffbL3g';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.innerText = "VÉRIFICATION...";
            btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Accès refusé : " + error.message);
                btn.innerText = "SE CONNECTER";
                btn.disabled = false;
            } else {
                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadCategories(); // Tes anciennes fonctions
                loadProducts();   // Tes anciennes fonctions
            }
        }

      async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    btn.innerText = "VÉRIFICATION...";

    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

    if (error) {
        alert("Erreur : " + error.message);
        btn.innerText = "SE CONNECTER";
    } else {
        // --- C'EST CETTE PARTIE QUI MANQUE SÛREMENT ---
        document.getElementById('login-card').classList.add('hidden'); // On cache le login
        document.getElementById('admin-content').classList.remove('hidden'); // On montre l'admin
        
        // On lance le chargement des données
        loadCategories(); 
        loadProducts();
    }
}
    </script>
</body>
</html>
