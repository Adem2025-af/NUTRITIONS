<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Elite Admin | Full Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .gold { color: #D4AF37; }
        .btn-gold { background: #D4AF37; color: black; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-8">

    <div id="login-zone" class="max-w-md mx-auto mt-20 bg-[#0a0a0a] p-8 rounded-3xl border border-white/10">
        <h1 class="text-2xl font-bold text-center mb-6 uppercase">Elite <span class="gold">Admin</span></h1>
        <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-4 bg-black border border-white/10 rounded-xl">
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-3 mb-6 bg-black border border-white/10 rounded-xl">
        <button onclick="login()" class="w-full btn-gold py-3 rounded-xl">CONNEXION</button>
    </div>

    <div id="admin-zone" class="hidden max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black gold uppercase italic">Dashboard</h1>
            <button onclick="logout()" class="text-red-500 text-sm">Déconnexion</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="bg-[#0a0a0a] p-6 rounded-3xl border border-white/5">
                <h2 class="text-xl font-bold mb-6 italic">AJOUTER UN PRODUIT</h2>
                <div class="space-y-4">
                    <input type="text" id="p_nom" placeholder="Nom du produit" class="w-full p-3 bg-black border border-white/10 rounded-lg">
                    <input type="number" id="p_prix" placeholder="Prix (DZD)" class="w-full p-3 bg-black border border-white/10 rounded-lg">
                    <select id="p_cat" class="w-full p-3 bg-black border border-white/10 rounded-lg"></select>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="p_premium" class="w-5 h-5">
                        <label>Badge PREMIUM ⭐</label>
                    </div>
                    <input type="file" id="p_file" class="text-sm">
                    <button onclick="upload()" id="btnPub" class="w-full btn-gold py-4 rounded-xl mt-4">PUBLIER</button>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-bold mb-6 italic">INVENTAIRE</h2>
                <div id="p_liste" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION MISE À JOUR ---
        const S_URL = 'https://aowscxkvlrlenzjhisec.supabase.co';
        const S_KEY = 'sb_publishable_DJTUfgRZvgWmp3qIFStrIA_gJ6yi-U-';
        const _supa = supabase.createClient(S_URL, S_KEY);

        async function login() {
            const { error } = await _supa.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('pass').value
            });
            if (error) alert("Erreur : " + error.message); else checkUser();
        }

        async function checkUser() {
            const { data } = await _supa.auth.getSession();
            if (data.session) {
                document.getElementById('login-zone').classList.add('hidden');
                document.getElementById('admin-zone').classList.remove('hidden');
                loadData();
            }
        }

        async function logout() { await _supa.auth.signOut(); location.reload(); }

        async function loadData() {
            // Charger catégories
            const { data: cats } = await _supa.from('categorie').select('*');
            if(cats) document.getElementById('p_cat').innerHTML = cats.map(c => `<option value="${c.id}">${c.nom}</option>`).join('');
            
            // Charger produits
            const { data: prods } = await _supa.from('produits').select('*').order('created_at', {ascending: false});
            if(prods) {
                document.getElementById('p_liste').innerHTML = prods.map(p => `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                        <div class="flex items-center gap-4">
                            <img src="${p.image_url}" class="w-12 h-12 object-cover rounded-lg border border-white/10">
                            <div>
                                <p class="font-bold text-sm">${p.nom} ${p.is_premium ? '⭐' : ''}</p>
                                <p class="text-xs gold">${p.prix} DZD</p>
                            </div>
                        </div>
                        <button onclick="del(${p.id})" class="text-red-500 text-xs bg-red-500/10 px-3 py-1 rounded-lg">Supprimer</button>
                    </div>
                `).join('');
            }
        }

        async function upload() {
            const fileInput = document.getElementById('p_file');
            const file = fileInput.files[0];
            const btn = document.getElementById('btnPub');
            
            if (!file) return alert("Choisis une image !");
            
            btn.innerText = "CHARGEMENT..."; btn.disabled = true;

            try {
                // 1. Upload Image
                const fName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
                const { error: upErr } = await _supa.storage.from('IMAGES-PRODUITS').upload(fName, file);
                if (upErr) throw upErr;

                // 2. Lien Public
                const { data: urlData } = _supa.storage.from('IMAGES-PRODUITS').getPublicUrl(fName);

                // 3. Insert BDD
                const { error: dbErr } = await _supa.from('produits').insert([{
                    nom: document.getElementById('p_nom').value,
                    prix: document.getElementById('p_prix').value,
                    categorie_id: document.getElementById('p_cat').value,
                    is_premium: document.getElementById('p_premium').checked,
                    image_url: urlData.publicUrl
                }]);
                if (dbErr) throw dbErr;

                alert("Produit ajouté avec succès !");
                fileInput.value = ""; // Reset file input
                loadData();
            } catch (e) { 
                alert("Erreur système : " + e.message); 
            }
            btn.innerText = "PUBLIER"; btn.disabled = false;
        }

        async function del(id) {
            if(confirm("Voulez-vous vraiment supprimer ce produit ?")) {
                const { error } = await _supa.from('produits').delete().eq('id', id);
                if (error) alert(error.message); else loadData();
            }
        }

        window.onload = checkUser;
    </script>
</body>
</html>
